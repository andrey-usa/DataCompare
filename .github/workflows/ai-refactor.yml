name: Daily AI Refactor

# This workflow runs daily to perform automated refactoring using an AI agent.
# It checks out the code, installs dependencies, runs baseline tests and
# benchmarks, invokes the AI tool to apply small refactors, then reruns the
# tests and benchmarks. If all checks pass, it opens a pull request with the
# changes.

on:
  # Run at 06:00 UTC every day (02:00 America/New_York)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual dispatch of the workflow
  workflow_dispatch: {}

jobs:
  ai-refactor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run baseline tests
        run: |
          pytest -q

      - name: Run baseline benchmarks
        run: |
          pytest --benchmark-only -q

      - name: Install AI tool
        # Install Aider so the workflow can run the automated refactor prompt.
        run: |
          pip install aider

      - name: Run AI refactoring
        # Use Aider to apply the instructions from ai/prompts/daily_objectives.md.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          aider \
            --repo-dir . \
            --model gpt-4o \
            --apply-suggestions \
            --message "$(cat ai/prompts/daily_objectives.md)"

      - name: Run tests on refactored code
        run: |
          pytest -q

      - name: Run benchmarks on refactored code
        run: |
          pytest --benchmark-only -q

      - name: Create pull request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          branch: auto/refactor-${{ github.run_id }}
          commit-message: "chore: automated daily refactor"
          title: "Automated daily refactor"
          body: |
            This pull request contains small automated refactors generated by the
            AI agent with the goal of improving performance and code quality.
            Tests and benchmarks have passed in CI. Please review the changes
            and merge if they look reasonable.
