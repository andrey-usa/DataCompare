name: Daily AI Refactor

on:
  schedule:
    - cron: "0 6 * * *"  # Runs daily at 06:00 UTC
  workflow_dispatch:

jobs:
  ai-refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run baseline tests
        run: |
          pytest -q

      - name: Run baseline benchmarks
        run: |
          pytest --benchmark-only -q

      - name: Install AI tool
        # Install Aider so the workflow can run the automated refactor prompt.
        run: |
          python -m pip install aider

      - name: Run AI refactoring
        # Use Aider to apply the instructions from ai/prompts/daily_objectives.md.
        env:
   env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
continue-on-error: true
run: |
  aider --yes --message-file ai/prompts/daily_objectives.md --model gpt-4o || trueompts/daily_objectives.md)"

      - name: Run tests on refactored code
        run: |
          pytest -q

      - name: Run benchmarks on refactored code
        run: |
          pytest --benchmark-only -q

      - name: Create pull request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          branch: auto/refactor-${{ github.run_id }}
          commit-message: "chore: automated daily refactor"
          title: "Automated daily refactor"
          body: |
            This pull request contains small automated refactorings generated by an AI agent focused on performance and code health for Polars. The changes have been tested and benchmarked to ensure no regressions.
