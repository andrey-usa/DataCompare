name: Daily AI Refactor

on:
  schedule:
    - cron: "0 6 * * *"  # Runs daily at 06:00 UTC
  workflow_dispatch:

jobs:
  ai-refactor:
    runs-on: ubuntu-latest
    # Set GH_TOKEN globally so GitHub CLI can authenticate throughout the job
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run baseline tests
        run: pytest -q

      - name: Run baseline benchmarks
        run: pytest --benchmark-only -q

      - name: Install GitHub Copilot CLI
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gh
          gh extension install github/copilot-cli

      - name: Run GitHub Copilot refactoring
        continue-on-error: true
        run: |
          # Use Copilot CLI to apply suggestions from the prompt file
          gh copilot suggest --message-file ai/prompts/daily_objectives.md --apply || true

      - name: Run tests on refactored code
        run: pytest -q

      - name: Run benchmarks on refactored code
        run: pytest --benchmark-only -q

      - name: Create pull request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          branch: auto/refactor-${{ github.run_id }}
          commit-message: "chore: automated daily refactor"
          title: "Automated daily refactor"
          body: |
            This pull request contains small refactoring changes applied by GitHub Copilot according to the prompt in `ai/prompts/daily_objectives.md`.
