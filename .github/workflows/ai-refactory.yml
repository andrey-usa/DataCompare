---
name: Daily AI Refactor
permissions:
  contents: write
  pull-requests: write

"on":
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC daily
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  ai-refactor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests before refactoring
        id: test_before
        run: |
          pytest -v
          echo "Tests passed before refactoring"

      - name: Run AI Refactor with aider
        id: ai_refactor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Create a new branch for the refactor
          BRANCH_NAME="ai-refactor/daily-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Use aider to refactor code based on daily objectives
          # Read the objectives and apply them to the codebase
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "Running aider with daily objectives..."
            aider --yes --message "$(cat ai/prompts/daily_objectives.md)" \
              compare.py data_compare.py || \
              echo "Aider completed with warnings"
          else
            echo "Warning: OPENAI_API_KEY not set."
            echo "Skipping AI refactoring."
            echo "skipped=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests after refactoring
        id: test_after
        if: steps.ai_refactor.outputs.skipped != 'true'
        run: |
          pytest -v
          echo "Tests passed after refactoring"

      - name: Check for changes
        id: check_changes
        if: steps.ai_refactor.outputs.skipped != 'true'
        run: |
          if git diff --quiet; then
            echo "No changes made by AI refactor"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: |
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.test_after.conclusion == 'success'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email \
            'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Automated AI refactor - $(date +%Y-%m-%d)"
          git push origin "${{ steps.ai_refactor.outputs.BRANCH_NAME }}"

      - name: Create Pull Request
        if: |
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.test_after.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base master \
            --head "${{ steps.ai_refactor.outputs.BRANCH_NAME }}" \
            --title "🤖 Daily AI Refactor - $(date +%Y-%m-%d)" \
            --body "## Automated AI Refactoring

          This PR contains automated code improvements generated by the daily AI refactor workflow.

          ### Objectives Applied
          - Use lazy evaluation and pipeline chaining
          - Filter early and minimize conversions
          - Optimize memory usage
          - Be mindful of parallelism
          - Keep changes minimal

          ### Test Status
          ✅ All tests passed before and after refactoring

          Please review the changes carefully before merging." \
            --label "ai-refactor" \
            --label "automated"
