---
name: Daily AI Refactor with Self-Healing
permissions:
  contents: write
  pull-requests: write

"on":
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC daily
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  ai-refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15-minute time limit for the entire workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests before refactoring
        id: test_before
        run: |
          pytest -v
          echo "Tests passed before refactoring"

      - name: AI Refactor Loop with Self-Healing
        id: ai_refactor_loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Set overall timeout (13 minutes - leaving 2 minutes buffer)
          WORKFLOW_TIMEOUT=$((13 * 60))
          START_TIME=$(date +%s)
          MAX_ATTEMPTS=5
          ATTEMPT=1
          SUCCESS=false

          # Create a new branch for the refactor
          BRANCH_NAME="ai-refactor/daily-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Warning: OPENAI_API_KEY not set."
            echo "Skipping AI refactoring."
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Function to check if we're within time budget
          check_time_budget() {
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -ge $WORKFLOW_TIMEOUT ]; then
              echo "Time budget exceeded (${ELAPSED}s / ${WORKFLOW_TIMEOUT}s)"
              return 1
            fi
            echo "Time remaining: $((WORKFLOW_TIMEOUT - ELAPSED))s"
            return 0
          }

          # Refactor and self-healing loop
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = "false" ]; do
            echo "=========================================="
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS"
            echo "=========================================="

            # Check time budget before each attempt
            if ! check_time_budget; then
              echo "time_exceeded=true" >> $GITHUB_OUTPUT
              break
            fi

            if [ $ATTEMPT -eq 1 ]; then
              # First attempt: Normal refactoring
              echo "Running AI refactor with daily objectives..."
              
              timeout 300 aider --yes --message "$(cat ai/prompts/daily_objectives.md)" \
                compare.py data_compare.py 2>&1 | tee /tmp/aider_output.log || {
                echo "Aider completed with warnings or timeout"
              }
            else
              # Subsequent attempts: Failure recovery mode
              echo "Running AI self-healing mode (attempt $ATTEMPT)..."
              
              # Capture test failure details if available
              if [ -f /tmp/test_output.log ]; then
                FAILURE_CONTEXT="Previous test failures:\n$(cat /tmp/test_output.log | tail -100)"
              else
                FAILURE_CONTEXT="Previous attempt failed. Please analyze and fix."
              fi

              # Use recovery prompt with failure context
              timeout 300 aider --yes --message "$(cat ai/prompts/failure_recovery.md)

              ## Current Failure Context
              $FAILURE_CONTEXT

              Please analyze the failure, identify the root cause, and apply a minimal fix to restore functionality.
              Focus on making surgical changes only to what's broken." \
                compare.py data_compare.py 2>&1 | tee /tmp/aider_output.log || {
                echo "Recovery attempt completed with warnings or timeout"
              }
            fi

            # Run tests to check if changes work
            echo "Running tests after attempt $ATTEMPT..."
            if pytest -v 2>&1 | tee /tmp/test_output.log; then
              echo "✅ Tests passed on attempt $ATTEMPT!"
              SUCCESS=true
              echo "success=true" >> $GITHUB_OUTPUT
              echo "attempts=$ATTEMPT" >> $GITHUB_OUTPUT
            else
              echo "❌ Tests failed on attempt $ATTEMPT"
              echo "Will retry with self-healing if time permits..."
              
              # If this isn't the last attempt, reset to clean state for next attempt
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                # Keep track of what changed for analysis
                git diff > /tmp/failed_attempt_$ATTEMPT.diff
                git reset --hard HEAD
              fi
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          # Final status
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ AI refactor completed successfully after $((ATTEMPT - 1)) attempt(s)"
          else
            echo "❌ AI refactor failed after $MAX_ATTEMPTS attempts"
            echo "failed=true" >> $GITHUB_OUTPUT
            
            # Save failure report
            {
              echo "# AI Refactor Failure Report - $(date +%Y-%m-%d)"
              echo ""
              echo "## Summary"
              echo "- Attempts made: $MAX_ATTEMPTS"
              echo "- Time spent: $(($(date +%s) - START_TIME))s"
              echo ""
              echo "## Last Test Output"
              if [ -f /tmp/test_output.log ]; then
                tail -100 /tmp/test_output.log
              fi
              echo ""
              echo "## Last Aider Output"
              if [ -f /tmp/aider_output.log ]; then
                tail -50 /tmp/aider_output.log
              fi
            } > /tmp/failure_report.md
            
            # Reset to clean state
            git reset --hard HEAD
          fi

      - name: Check for changes
        id: check_changes
        if: steps.ai_refactor_loop.outputs.skipped != 'true' && steps.ai_refactor_loop.outputs.failed != 'true'
        run: |
          if git diff --quiet; then
            echo "No changes made by AI refactor"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: |
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.ai_refactor_loop.outputs.success == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email \
            'github-actions[bot]@users.noreply.github.com'
          git add .
          
          ATTEMPTS="${{ steps.ai_refactor_loop.outputs.attempts }}"
          if [ "$ATTEMPTS" = "1" ]; then
            COMMIT_MSG="Automated AI refactor - $(date +%Y-%m-%d)"
          else
            COMMIT_MSG="Automated AI refactor with self-healing (${ATTEMPTS} attempts) - $(date +%Y-%m-%d)"
          fi
          
          git commit -m "$COMMIT_MSG"
          git push origin "${{ steps.ai_refactor_loop.outputs.BRANCH_NAME }}"

      - name: Create Pull Request
        if: |
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.ai_refactor_loop.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ATTEMPTS="${{ steps.ai_refactor_loop.outputs.attempts }}"
          
          if [ "$ATTEMPTS" = "1" ]; then
            TITLE="🤖 Daily AI Refactor - $(date +%Y-%m-%d)"
            HEALING_NOTE=""
          else
            TITLE="🤖 Daily AI Refactor with Self-Healing (${ATTEMPTS} attempts) - $(date +%Y-%m-%d)"
            HEALING_NOTE="

          ### 🔧 Self-Healing Applied
          This refactor required **${ATTEMPTS} attempts** to complete successfully.
          The AI agent automatically detected and fixed issues during the process."
          fi

          gh pr create \
            --base master \
            --head "${{ steps.ai_refactor_loop.outputs.BRANCH_NAME }}" \
            --title "$TITLE" \
            --body "## Automated AI Continuous Improvement

          This PR contains automated code improvements generated by the daily AI refactor workflow.
          
          The AI agent explores **new approaches, techniques, and optimizations** each day to
          continuously improve the codebase with fresh ideas and modern best practices.${HEALING_NOTE}

          ### Focus Areas Explored
          - Performance optimization and bottleneck identification
          - Modern Python and Polars patterns from latest releases
          - Code quality enhancements and refactoring
          - New library features and alternative implementations
          - Testing coverage and reliability improvements

          ### Test Status
          ✅ All tests passed before and after refactoring

          Please review the changes carefully before merging. The commit message
          will explain the specific improvement applied in this iteration." \
            --label "ai-refactor" \
            --label "automated"

      - name: Report Failure
        if: |
          steps.ai_refactor_loop.outputs.failed == 'true' ||
          steps.ai_refactor_loop.outputs.time_exceeded == 'true'
        run: |
          echo "::error::AI refactor workflow failed after maximum attempts or time limit"
          
          if [ -f /tmp/failure_report.md ]; then
            echo "::group::Failure Report"
            cat /tmp/failure_report.md
            echo "::endgroup::"
          fi
          
          if [ "${{ steps.ai_refactor_loop.outputs.time_exceeded }}" = "true" ]; then
            echo "::error::Workflow exceeded 15-minute time limit"
          fi
          
          exit 1
